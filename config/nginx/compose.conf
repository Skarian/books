map $http_x_forwarded_proto $books_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $books_forwarded_host {
    default $http_x_forwarded_host;
    "" $host;
}

server {
    listen 8000;
    server_name _;

    client_max_body_size 256M;
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $books_calibre http://calibre:8080;
    set $books_node http://app:8090;
    set $books_kosync http://kosync:17200;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $books_forwarded_host;
    proxy_set_header X-Forwarded-Proto $books_forwarded_proto;
    proxy_buffering off;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        proxy_pass $books_node;
    }

    location = /catalog {
        rewrite ^ /opds break;
        proxy_pass $books_calibre;
    }

    location ^~ /catalog/ {
        rewrite ^/catalog/(.*)$ /opds/$1 break;
        proxy_pass $books_calibre;
    }

    location ^~ /opds {
        proxy_pass $books_calibre;
    }

    location ^~ /get/ {
        proxy_pass $books_calibre;
    }

    location = /kosync {
        return 308 /kosync/;
    }

    location ^~ /kosync/users/create {
        return 404;
    }

    location ^~ /kosync/ {
        rewrite ^/kosync/(.*)$ /$1 break;
        proxy_set_header X-Forwarded-Prefix /kosync;
        proxy_pass $books_kosync;
    }

    location = /favicon.png {
        proxy_pass $books_calibre;
    }

    location ^~ /setup/ {
        proxy_pass $books_node;
    }

    location ~ ^/library/?$ {
        return 302 https://web.readest.com/;
    }

    location / {
        return 404;
    }
}
