services:
  proxy:
    image: nginx:alpine
    ports:
      - "${BOOKS_BIND_ADDR:-127.0.0.1}:${BOOKS_PROXY_PORT:-8000}:8000"
    volumes:
      - ./config/nginx/compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - calibre
      - kosync
    restart: unless-stopped

  calibre:
    build:
      context: .
      dockerfile: docker/books/Dockerfile
    image: books-runtime
    command:
      - calibre-server
      - --listen-on
      - "0.0.0.0"
      - --port
      - "8080"
      - --enable-auth
      - --auth-mode=basic
      - --userdb
      - /srv/books/config/users.sqlite
      - --log
      - /srv/books/log/calibre.log
      - --access-log
      - /srv/books/log/calibre-access.log
      - --max-log-size
      - "10"
      - --book-list-mode
      - details_list
      - --max-opds-items
      - "100"
      - --max-opds-ungrouped-items
      - "100"
      - /srv/books/library
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}:/srv/books
    expose:
      - "8080"
    restart: unless-stopped

  kosync:
    image: koreader/kosync@sha256:bb3f13615365703315a43b9059f65e71e876440f867e23a42bf27f2fa18264e1
    environment:
      ENABLE_USER_REGISTRATION: "true"
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}/kosync/redis:/var/lib/redis
      - ${BOOKS_HOST_DATA_DIR:-./data}/log/kosync/redis:/var/log/redis
      - ${BOOKS_HOST_DATA_DIR:-./data}/log/kosync/app:/app/koreader-sync-server/logs
    expose:
      - "17200"
      - "7200"
    restart: unless-stopped

  worker:
    image: books-runtime
    env_file:
      - .env
    command: ["sh", "-lc", "while true; do node src/cli.js hardcover sync; sleep 300; done"]
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}:/srv/books
    depends_on:
      - calibre
      - kosync
    restart: unless-stopped

  admin:
    image: books-runtime
    profiles: ["admin"]
    env_file:
      - .env
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}:/srv/books
    entrypoint: ["/app/docker/books/entrypoint.sh", "/app/src/cli.js"]
    command: ["--help"]
