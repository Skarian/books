services:
  proxy:
    image: nginx:alpine
    security_opt:
      - no-new-privileges:true
    ports:
      - "${BOOKS_BIND_ADDR:-127.0.0.1}:${BOOKS_PROXY_PORT:-8000}:8000"
    volumes:
      - ./config/nginx/compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - calibre
      - kosync
      - setup
    restart: unless-stopped

  calibre:
    build:
      context: .
      dockerfile: docker/books/Dockerfile
    image: books-runtime
    security_opt:
      - no-new-privileges:true
    command:
      - calibre-debug
      - -e
      - /app/docker/books/calibre-stored-server.py
      - --
      - --listen-on
      - "0.0.0.0"
      - --port
      - "8080"
      - --enable-auth
      - --auth-mode=basic
      - --userdb
      - /srv/books/config/users.sqlite
      - --log
      - /srv/books/log/calibre.log
      - --access-log
      - /srv/books/log/calibre-access.log
      - --max-log-size
      - "10"
      - --book-list-mode
      - details_list
      - --ignored-fields
      - "#books_users"
      - --max-opds-items
      - "100"
      - --max-opds-ungrouped-items
      - "100"
      - /srv/books/library
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}:/srv/books
    expose:
      - "8080"
    restart: unless-stopped

  kosync:
    image: koreader/kosync@sha256:bb3f13615365703315a43b9059f65e71e876440f867e23a42bf27f2fa18264e1
    security_opt:
      - no-new-privileges:true
    environment:
      ENABLE_USER_REGISTRATION: "true"
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}/kosync/redis:/var/lib/redis
      - ${BOOKS_HOST_DATA_DIR:-./data}/log/kosync/redis:/var/log/redis
      - ${BOOKS_HOST_DATA_DIR:-./data}/log/kosync/app:/app/koreader-sync-server/logs
    expose:
      - "17200"
      - "7200"
    restart: unless-stopped

  worker:
    image: books-runtime
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    command: ["sh", "-lc", "while true; do node src/cli.js hardcover sync; sleep 60; done"]
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}:/srv/books
    secrets:
      - annas_secret_key
    depends_on:
      - calibre
      - kosync
    restart: unless-stopped

  setup:
    image: books-runtime
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    command: ["node", "src/setup-server.js"]
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}:/srv/books
      - ${BOOKS_HOST_CODEX_HOME:-./data/config/codex-disabled}:/codex-home
    expose:
      - "3000"
    restart: unless-stopped

  admin:
    image: books-runtime
    security_opt:
      - no-new-privileges:true
    profiles: ["admin"]
    env_file:
      - .env
    volumes:
      - ${BOOKS_HOST_DATA_DIR:-./data}:/srv/books
    secrets:
      - annas_secret_key
    entrypoint: ["/app/docker/books/entrypoint.sh", "/app/src/cli.js"]
    command: ["--help"]

secrets:
  annas_secret_key:
    file: ./secrets/annas_secret_key
